version: "3.9"

# ── Services ────────────────────────────────────────────────────────────────────

services:
  # ── Redis: message memory store ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pa-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Qdrant: vector database (replaces Milvus — no AVX CPU required) ─────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pa-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Personal Assistant API ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pa-app
    ports:
      - "8000:8000"
    environment:
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # Qdrant
      QDRANT_URI: http://qdrant:6333
      QDRANT_COLLECTION: personal_assistant_kb
      # LLM
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Tools
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      AMAP_KEY: ${AMAP_KEY:-}
      # App
      APP_ENV: production
      DEBUG: "false"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

# ── Volumes ────────────────────────────────────────────────────────────────────

volumes:
  redis_data:
  qdrant_data:
